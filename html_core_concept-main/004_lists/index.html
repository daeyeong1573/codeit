<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>연습: 리스트</title>
    <!--
      ========== 연습 요구사항 ==========
      아래에 ol, ul, li, dl/dt/dd 태그를 사용하세요.

      1. h2: "커피 내리는 방법"
      2. ol + li 5개: 물 끓이기, 원두 갈기, 필터에 넣기, 물 부어주기, 기다리기
      3. h2: "장보기 목록"
      4. ul + li 4개: 우유, 계란, 빵, 사과
      5. h2: "HTML 용어"
      6. dl 안에 dt "HTML" / dd "웹 페이지 구조를 만드는 마크업 언어", dt "CSS" / dd "스타일을 담당"
    -->
  </head>
  <body>
    <!-- 여기에 작성하세요. -->
    <h2>커피 내리는 방법</h2>
    <ol start="4">
      <li>물 끓이기</li>
      <li>원두 갈기</li>
      <li>필터에 넣기</li>
      <li>물 부어주기</li>
      <li>기다리기</li>
    </ol>

    <h2>장보기 목록</h2>
    <ul>
      <li>우유</li>
      <li>계란</li>
      <li>빵</li>
      <li>사과</li>
    </ul>

    <h2>HTML 용어</h2>
    <dl>
      <dt>HTML</dt>
      <dd>웹 페이지 구조를 만드는 마크업 언어</dd>
      <dt>CSS</dt>
      <dd>스타일을 담당</dd>
    </dl>
  </body>
</html>
