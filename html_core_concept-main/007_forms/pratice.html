<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>회원가입</title>
    <style>
      form {
        max-width: 500px;
        margin: 50px auto;
        padding: 30px;
        border: 1px solid #ddd;
        border-radius: 8px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }

      input[type="text"],
      input[type="email"],
      input[type="password"],
      input[type="tel"],
      input[type="date"],
      select,
      textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
      }

      button {
        width: 100%;
        padding: 12px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background-color: #45a049;
      }
    </style>
  </head>
  <body>
    <form action="/register" method="POST">
      <h2>회원가입</h2>

      <div class="form-group">
        <label for="username">아이디 *</label>
        <input type="text" id="username" name="username" required />
      </div>

      <div class="form-group">
        <label for="password">비밀번호 *</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          minlength="8"
        />
      </div>

      <div class="form-group">
        <label for="password-confirm">비밀번호 확인 *</label>
        <input
          type="password"
          id="password-confirm"
          name="passwordConfirm"
          required
        />
      </div>

      <div class="form-group">
        <label for="email">이메일 *</label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="form-group">
        <label for="phone">전화번호</label>
        <input type="tel" id="phone" name="phone" placeholder="010-1234-5678" />
      </div>

      <div class="form-group">
        <label for="birthday">생년월일</label>
        <input type="date" id="birthday" name="birthday" />
      </div>

      <div class="form-group">
        <label>성별</label>
        <label><input type="radio" name="gender" value="male" /> 남성</label>
        <label><input type="radio" name="gender" value="female" /> 여성</label>
        <label><input type="radio" name="gender" value="other" /> 기타</label>
      </div>

      <div class="form-group">
        <label for="city">거주 지역</label>
        <select id="city" name="city">
          <option value="">선택하세요</option>
          <option value="seoul">서울</option>
          <option value="busan">부산</option>
          <option value="daegu">대구</option>
          <option value="incheon">인천</option>
        </select>
      </div>

      <div class="form-group">
        <label>관심 분야 (복수 선택 가능)</label>
        <label
          ><input type="checkbox" name="interest" value="tech" /> 기술</label
        >
        <label
          ><input type="checkbox" name="interest" value="design" />
          디자인</label
        >
        <label
          ><input type="checkbox" name="interest" value="business" />
          비즈니스</label
        >
      </div>

      <div class="form-group">
        <label for="bio">자기소개</label>
        <textarea
          id="bio"
          name="bio"
          rows="5"
          placeholder="간단한 자기소개를 작성해주세요"
        ></textarea>
      </div>

      <div class="form-group">
        <label>
          <input type="checkbox" name="agree" value="yes" required />
          이용약관에 동의합니다 *
        </label>
      </div>

      <button type="submit">가입하기</button>
    </form>
  </body>
</html>
